root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  bin = "./tmp/main.exe"
  cmd = "go build -o ./tmp/main.exe ./cmd/server"
  exclude_dir = ["tmp", "vendor"]
  include_ext = ["go", "toml", "env"]
  exclude_regex = ["_test.go"]
  delay = 1000
  stop_on_error = true
  kill_delay = "0.5s"

[log]
  log_time = false
  log_level = "info"

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
